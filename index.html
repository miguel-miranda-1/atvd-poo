<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Produto</title>
    <style>
        
        #card-preview {
            width: 100px;
            height: 100px;
            border: 1px solid #000000;
            background-color: #ffffff; /* Fundo inicial padrão */
            margin-top: 10px;
        }

        
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .controles {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .display-produto {
            padding: 15px;
            border: 1px dashed #ccc;
            width: fit-content;
        }
    </style>
</head>
<body>

    <div class="controles">
        <input type="text" id="in-nome" placeholder="nome do produto">
        <input type="color" id="in-cor">
    </div>

    <div class="display-produto">
        <h2 id="card-nome">Nome do produto</h2>
        <div id="card-preview"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
